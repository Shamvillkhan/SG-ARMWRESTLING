<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - SG ARMWRESTLING</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .logo {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 20px;
        }
        .logo span {
            color: #ff0000;
        }
        h1 {
            font-size: 8rem;
            color: #ff0000;
            line-height: 1;
            margin: 20px 0;
            font-weight: 800;
        }
        h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: 600;
        }
        p {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 15px 30px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #ff0000;
            color: white;
        }
        .btn-primary:hover {
            background: white;
            color: #ff0000;
            transform: scale(1.05);
        }
        .btn-secondary {
            background: #222;
            color: white;
            border: 1px solid #444;
        }
        .btn-secondary:hover {
            background: #333;
            transform: scale(1.05);
        }
        .emoji {
            font-size: 3rem;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">SG <span>ARMWRESTLING</span></div>
        <div class="emoji">💪</div>
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.<br>
        But don't worry - our equipment is still here!</p>
        
        <div class="buttons">
            <a href="/" class="btn btn-primary">← Back to Home</a>
            <a href="/#products" class="btn btn-secondary">View Equipment</a>
        </div>
        
        <p style="margin-top: 40px; font-size: 0.9rem;">
            <a href="https://wa.me/917225890969" style="color: #25D366;">📱 Contact us on WhatsApp</a>
        </p>

</body>
</html>
